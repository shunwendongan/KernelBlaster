name: Portfolio documentation sync

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify generated documentation blocks and evidence
        run: python scripts/sync_portfolio_docs.py --check
      - name: Require docs for benchmark and artifact changes
        if: github.event_name == 'pull_request'
        run: python scripts/sync_portfolio_docs.py --check --base-ref "origin/${{ github.base_ref }}"
