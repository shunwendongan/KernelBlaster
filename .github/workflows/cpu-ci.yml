name: CPU CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cpu-tests:
    name: CPU tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install CPU test dependencies
        run: python -m pip install -e ".[dev,server]" openai==1.77.0 uv==0.11.28
      - name: Verify dependency lock
        run: uv lock --check
      - name: Run CPU tests
        run: python -m pytest -q
      - name: Compile Python sources
        run: python -m compileall -q src scripts
      - name: Run basic static checks
        run: ruff check .

  dco:
    name: DCO
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify commit sign-offs
        run: python scripts/check_dco.py --base-ref "origin/${{ github.base_ref }}"
